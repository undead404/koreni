attribute-author: false
auto-commits: true
editor-model: gemini/gemini-3-flash-preview
auto-lint: true
auto-test: true
lint-cmd:
  - 'typescript: ./scripts/aider-check.sh'
  - 'typescriptreact: ./scripts/aider-check.sh'
  - 'css: yarn stylelint --fix'
model: gemini/gemini-3.1-pro-preview
# model: gemini/gemini-flash-latest
read:
  - ./CONVENTIONS.md
  - ./README.md
  - ./package.json
test-cmd: 'set -f && yarn vitest run --passWithNoTests'
