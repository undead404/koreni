name: Check PR
permissions:
  contents: read

on:
  pull_request:
    paths:
      - './**'
      - 'src/**'
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tools via Mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Install server dependencies
        run: yarn --frozen-lockfile --prefer-offline
        working-directory: src/server

      - name: Generate Kysely types
        run: yarn exec kysely-codegen --dialect libsql
        working-directory: src/server
        env:
          DATABASE_URL: '${{ vars.TURSO_DATABASE_URL }}?authToken=${{ secrets.TURSO_DATABASE_TOKEN }}'

      - name: Lint
        run: yarn lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up tools via Mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Run tests
        run: yarn test
        env:
          NEXT_PUBLIC_GITHUB_OWNER: owner
          NEXT_PUBLIC_GITHUB_REPO: repo
          NEXT_PUBLIC_GISCUS_REPO_ID: repo-id
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: category-id
          NEXT_PUBLIC_TYPESENSE_SEARCH_KEY: typesense-search-key
          NEXT_PUBLIC_TYPESENSE_HOST: typesense-host
          NEXT_PUBLIC_SITE: site
